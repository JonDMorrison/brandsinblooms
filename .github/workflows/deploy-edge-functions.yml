name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed functions
        id: changed
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- supabase/functions/ \
            | grep -oP 'supabase/functions/\K[^/]+' \
            | grep -v '^_' \
            | sort -u \
            | tr '\n' ' ')

          if [[ -z "$changed" ]]; then
            echo "functions=" >> "$GITHUB_OUTPUT"
            echo "No individual function changes detected — will deploy all."
          else
            echo "functions=$changed" >> "$GITHUB_OUTPUT"
            echo "Changed functions: $changed"
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          functions="${{ steps.changed.outputs.functions }}"
          succeeded=0
          failed=0
          failed_names=""

          # If no specific changes detected, deploy all non-internal functions
          if [[ -z "$functions" ]]; then
            echo "Falling back to deploying all functions..."
            functions=""
            for dir in supabase/functions/*/; do
              fn="$(basename "$dir")"
              [[ "$fn" == _* ]] && continue
              functions="$functions $fn"
            done
          fi

          total=$(echo "$functions" | wc -w | tr -d ' ')
          count=0

          for fn in $functions; do
            count=$((count + 1))
            echo "[$count/$total] Deploying $fn..."

            if supabase functions deploy "$fn" --project-ref "$PROJECT_ID" --no-verify-jwt; then
              echo "  ✓ $fn deployed"
              succeeded=$((succeeded + 1))
            else
              echo "  ✗ $fn FAILED"
              failed=$((failed + 1))
              failed_names="$failed_names $fn"
            fi
          done

          echo ""
          echo "=== Deployment Summary ==="
          echo "  Total:     $total"
          echo "  Succeeded: $succeeded"
          echo "  Failed:    $failed"

          if [[ $failed -gt 0 ]]; then
            echo "  Failed: $failed_names"
            exit 1
          fi
