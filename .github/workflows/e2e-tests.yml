name: E2E Tests

# Manual trigger only — prevents failure notification spam on every push
on:
  workflow_dispatch:
    inputs:
      project:
        description: "Playwright project to run"
        required: false
        default: "chromium"
        type: choice
        options:
          - chromium
          - setup

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps

    - name: Run E2E tests against production
      run: npx playwright test --config=playwright.prod.config.ts --project=${{ inputs.project }}
      env:
        E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
        E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results
        path: test-results/
        retention-days: 7
