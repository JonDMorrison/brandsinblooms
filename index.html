  <!-- Performance optimizations -->
  <style>
    /* Font loading optimization */
    @font-face {
      font-family: 'Quicksand';
      font-display: swap;
    }

    /* Initial loading state */
    #root {
      min-height: 100vh;
    }

    .initial-loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      color: #0F172A;
      background: #FFFFFF;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .initial-loading-screen__brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 900;
    }

    .initial-loading-screen__mark {
      width: 34px;
      height: 34px;
      color: #16A34A;
    }

    .initial-loading-screen__bar {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      height: 4px;
      overflow: hidden;
      background: #DCFCE7;
    }

    .initial-loading-screen__bar::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      background: #16A34A;
      animation: initial-loading-progress 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes initial-loading-progress {
      from {
        transform: translateX(-100%);
      }

      to {
        transform: translateX(240%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .initial-loading-screen__bar::before {
        animation: none;
        width: 100%;
      }
    }

    /* Remove FOUC */
    .loading-initial {
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
    }

    .loading-initial.loaded {
      opacity: 1;
    }
  </style>

  <!-- COMPLETELY DISABLE ALL ANALYTICS TO PREVENT FIREBASE/RUDDERSTACK ERRORS -->
  <script>
    console.log('🚫 COMPLETELY DISABLING ALL ANALYTICS TO PREVENT FIREBASE ERRORS');

    // Block all analytics, RudderStack, Firebase, and related services
    const noopService = function () {
      console.warn('🚫 BLOCKED: Analytics/Firebase service call prevented');
    };

    const noopAnalytics = {
      identify: noopService,
      track: noopService,
      page: noopService,
      load: noopService,
      reset: noopService,
      ready: noopService,
      debug: noopService
    };

    // Block all possible analytics objects immediately
    window.analytics = noopAnalytics;
    window.rudderanalytics = noopAnalytics;
    window.gtag = noopService;
    window.fbq = noopService;
    window.ttq = noopService;

    // Block Firebase services
    window.firebase = undefined;
    window.firestore = noopService;

    // Prevent any dynamic script loading that might contain analytics/firebase
    const originalAppendChild = Document.prototype.appendChild;
    Document.prototype.appendChild = function (child) {
      if (child.src && (
        child.src.includes('firebase') ||
        child.src.includes('rudder') ||
        child.src.includes('analytics') ||
        child.src.includes('gtag') ||
        child.src.includes('fbevents')
      )) {
        console.warn('🚫 BLOCKED: Script loading prevented:', child.src);
        return child;
      }
      return originalAppendChild.call(this, child);
    };

    console.log('✅ Complete analytics and Firebase blocking initialized');
  </script>
